<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#071022" />
  <title>Streamer Pose — Upper Body Skeleton</title>
  <style>
    :root{--bg:#0f1724;--card:#0b1220;--accent:#4fd1c5;--muted:#9aa6b2}
    html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Arial}
    body{background:linear-gradient(180deg,#071022 0%,#0b1220 100%);color:#e6eef3;display:flex;align-items:center;justify-content:center;padding:20px}
    .app{width:100%;max-width:900px;background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);border-radius:12px;padding:14px;box-shadow:0 10px 30px rgba(2,6,23,0.6)}
    .top{display:flex;align-items:center;gap:16px;margin-bottom:12px;position:relative}
    h1{font-size:18px;margin:0}
    .controls{margin-left:auto;display:flex;gap:8px;align-items:center}
    button{background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--accent);padding:8px 12px;border-radius:8px;cursor:pointer}
    button.secondary{color:var(--muted)}
    .stage{position:relative;background:#06101a;border-radius:8px;overflow:hidden}
    /* mobile-friendly stage sizing: keep a usable height without filling entire screen */
    .stage{width:100%;height:56vh;min-height:280px;max-height:720px}
    video{display:block;max-width:100%;width:100%;height:100%;object-fit:cover}
    canvas{position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none}
    .info{display:flex;gap:12px;align-items:center;margin-top:10px;font-size:13px;color:var(--muted)}
    .chip{background:rgba(255,255,255,0.02);padding:8px 10px;border-radius:999px;border:1px solid rgba(255,255,255,0.02)}
    .footer{margin-top:12px;color:var(--muted);font-size:13px}

    /* Menu button and panel */
    .menu-btn{background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--accent);padding:8px;border-radius:8px;cursor:pointer;display:flex;align-items:center}
    .menu-panel{position:absolute;top:calc(100% + 8px);right:0;background:#0b1220;border:1px solid rgba(255,255,255,0.04);padding:10px;border-radius:8px;box-shadow:0 8px 20px rgba(2,6,23,0.6);display:none;flex-direction:column;gap:8px;min-width:220px;z-index:10}
    .menu-panel.open{display:flex}
    .menu-panel label{display:flex;align-items:center;gap:8px;color:var(--muted);padding:6px;border-radius:6px}

    /* Switch style (label contains text then hidden checkbox then .slider) */
    .switch{display:flex;align-items:center;justify-content:space-between;color:var(--muted);padding:6px;border-radius:6px}
    .switch input{position:absolute;opacity:0;width:0;height:0}
    .switch .slider{width:44px;height:24px;background:#12161b;border-radius:999px;position:relative;display:inline-block;flex:0 0 auto;border:1px solid rgba(255,255,255,0.02)}
    .switch .slider::before{content:'';position:absolute;left:4px;top:4px;width:16px;height:16px;background:#e6eef3;border-radius:50%;transition:transform .18s ease}
    .switch input:checked + .slider{background:var(--accent);border-color:rgba(79,209,197,0.15)}
    .switch input:checked + .slider::before{transform:translateX(20px)}
    @media (max-width:600px){
      .menu-panel{right:8px;left:8px}
    }

    /* Responsive adjustments */
    @media (max-width:600px){
      body{padding:12px}
      .app{padding:12px}
      h1{font-size:16px}
      .controls{flex-wrap:wrap;gap:6px}
      button{padding:10px 14px;font-size:15px}
      .stage{height:60vh}
    }

    /* Fullscreen overlay shown when site is opened on non-mobile devices */
    .mobile-overlay{position:fixed;inset:0;background:linear-gradient(180deg,rgba(2,6,23,0.95),rgba(2,6,23,0.96));z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;text-align:center}
    .mobile-overlay .card{max-width:520px;background:transparent;color:#e6eef3}
    .mobile-overlay h2{margin:0 0 8px;font-size:20px}
    .mobile-overlay p{margin:0;color:var(--muted)}
    @media (prefers-reduced-motion:reduce){.mobile-overlay *{animation:none}}
  </style>
</head>
<body>
  <div id="mobileOnlyOverlay" class="mobile-overlay" style="display:none;">
    <div class="card" role="alert">
      <h2>This is a mobile-only site</h2>
      <p>Please open this page on a phone or other mobile device for the intended experience.</p>
    </div>
  </div>
  <div class="app">
    <div class="top">
      <div class="controls">
        <button id="menuBtn" class="menu-btn" aria-haspopup="true" aria-expanded="false" aria-controls="menuPanel">
          <svg width="18" height="14" viewBox="0 0 18 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect y="1" width="18" height="2" rx="1" fill="currentColor" />
            <rect y="6" width="18" height="2" rx="1" fill="currentColor" />
            <rect y="11" width="18" height="2" rx="1" fill="currentColor" />
          </svg>
        </button>
      </div>

      <div id="menuPanel" class="menu-panel" role="menu" aria-hidden="true">
        <label class="switch"><span>Hide Camera</span><input id="hideCameraChk" type="checkbox"><span class="slider"></span></label>
        <label class="switch"><span>Hide Images</span><input id="hideImagesChk" type="checkbox"><span class="slider"></span></label>
        <label class="switch"><span>Disable Blinking</span><input id="disableBlinkChk" type="checkbox"><span class="slider"></span></label>
      </div>
    </div>

    <div class="stage" id="stage">
      <video id="video" playsinline muted autoplay></video>
      <canvas id="overlay"></canvas>
    </div>

    

    <div class="footer">MadE By Mr $CR!BBL3$</div>
  </div>

  <script>
    (function(){
      const menuBtn = document.getElementById('menuBtn');
      const panel = document.getElementById('menuPanel');
      function closePanel(){ if(panel){panel.classList.remove('open'); menuBtn.setAttribute('aria-expanded','false'); panel.setAttribute('aria-hidden','true');} }
      function openPanel(){ if(panel){panel.classList.add('open'); menuBtn.setAttribute('aria-expanded','true'); panel.setAttribute('aria-hidden','false');} }
      if(menuBtn && panel){
        menuBtn.addEventListener('click', e => { e.stopPropagation(); if(panel.classList.contains('open')) closePanel(); else openPanel(); });
        panel.addEventListener('click', e => e.stopPropagation());
        document.addEventListener('click', () => { if(panel.classList.contains('open')) closePanel(); });
      }
    })();
  </script>

  <script>
    // Mobile-only detection and conditional script loading.
    (function(){
      function isMobile() {
        const ua = navigator.userAgent || navigator.vendor || window.opera || '';
        const mobileRegex = /Mobi|Android|iPhone|iPad|iPod|Phone|Mobile/i;
        if (mobileRegex.test(ua)) return true;
        if (navigator.maxTouchPoints && navigator.maxTouchPoints > 0 && Math.min(window.innerWidth, window.innerHeight) <= 900) return true;
        return false;
      }

      const overlay = document.getElementById('mobileOnlyOverlay');
      if (!isMobile()){
        if (overlay) overlay.style.display = 'flex';
        // Do not load heavy libs or run camera/pose code on desktop.
        return;
      }

      function loadScript(src){
        return new Promise((resolve, reject) => {
          const s = document.createElement('script');
          s.src = src;
          s.async = false;
          s.onload = () => resolve();
          s.onerror = () => reject(new Error('Failed to load ' + src));
          document.body.appendChild(s);
        });
      }

      // load Mediapipe libs then app script
      const libs = [
        'https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js',
        'https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js',
        'https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js'
      ];

      (async function(){
        try{
          for(const lib of libs) await loadScript(lib);
          await loadScript('pose.js');
        }catch(err){
          console.error('Script load error', err);
        }
      })();
    })();
  </script>
    </body>
    </html>
